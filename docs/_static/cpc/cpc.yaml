openapi: 3.0.3
info:
  title: Care Plan Contributor
  description: |-
    Care Plan Contributor for Shared Care Planning
  version: 0.0.0

servers:
  - url: https://fauxcare.test.integration.zorgbijjou.com/orca/cpc

paths:
  /:
    get:
      summary: Redirect to frontend
      responses:
        '200':
          description: Successful operation

  /fhir/notify:
    post:
      summary: Deliver notification
      description: Allows the client to deliver a FHIR [notification bundle](http://hl7.org/fhir/uv/subscriptions-backport/StructureDefinition/backport-subscription-notification-r4) see [example](https://santeonnl.github.io/shared-care-planning/Bundle-notification-hospitalx-01.json.html).
      requestBody:
        description: Notify this CPS of some events
        content:
          application/json: {}
        required: true
      responses:
        '200':
          description: Successful operation

  /fhir/{path}:
    get:
      summary: Proxy FHIR
      description: Proxy to EHR FHIR, provide `X-Scp-Context` header with CarePlan reference.
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}


  /context:
    get:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json: {}


  /ehr/fhir/{path}:
    summary: EHR
    description: Proxy request to the EHR's FHIR endpoint
    get:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}
    post:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json: {}
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}
    put:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json: {}
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}

  /cps/fhir/{path}:
    summary: CPS
    description: Proxy request to the CPS's FHIR endpoint
    get:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}
    post:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json: {}
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}
    put:
      parameters:
        - in: header
          name: X-Scp-Context
          description: CarePlan for which this request is in-scope. Auhtorization will be based on CareTeam membership.
          schema:
            type: string
            format: uri
          required: true
        - name: path
          in: path
          description: path to proxy
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json: {}
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/fhir+json: {}
